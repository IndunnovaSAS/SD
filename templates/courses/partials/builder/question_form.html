{% comment %}
Dynamic question form for adding/editing questions in the assessment builder.
Context: course, assessment, is_edit (bool), question (optional, for editing)
{% endcomment %}

<div x-data="{
    questionType: '{% if is_edit %}{{ question.question_type }}{% else %}single_choice{% endif %}',
    text: '',
    explanation: '',
    points: {% if is_edit %}{{ question.points }}{% else %}1{% endif %},
    trueFalseCorrect: 'true',
    answers: [
        {% if is_edit and question.question_type == 'single_choice' or is_edit and question.question_type == 'multiple_choice' %}
            {% for answer in question.answers.all %}
            { text: '{{ answer.text|escapejs }}', is_correct: {{ answer.is_correct|yesno:'true,false' }} },
            {% endfor %}
        {% else %}
            { text: '', is_correct: false },
            { text: '', is_correct: false },
        {% endif %}
    ],
    matchPairs: [
        {% if is_edit and question.question_type == 'matching' %}
            {% for answer in question.answers.all %}
            { left: '{{ answer.text|escapejs }}', right: '{{ answer.feedback|escapejs }}' },
            {% endfor %}
        {% else %}
            { left: '', right: '' },
            { left: '', right: '' },
        {% endif %}
    ],
    addAnswer() { this.answers.push({ text: '', is_correct: false }); },
    removeAnswer(i) { this.answers.splice(i, 1); },
    setSingleCorrect(i) { this.answers.forEach((a, idx) => a.is_correct = (idx === i)); },
    addMatchPair() { this.matchPairs.push({ left: '', right: '' }); },
    removeMatchPair(i) { this.matchPairs.splice(i, 1); },
}" x-init="
    {% if is_edit %}
        text = '{{ question.text|escapejs }}';
        explanation = '{{ question.explanation|escapejs }}';
        {% if question.question_type == 'true_false' %}
            {% for answer in question.answers.all %}
                {% if answer.is_correct %}
                    trueFalseCorrect = '{{ answer.text|escapejs }}' === 'Verdadero' ? 'true' : 'false';
                {% endif %}
            {% endfor %}
        {% endif %}
    {% endif %}
" class="bg-base-200 rounded-lg p-4">
    <form hx-post="{% if is_edit %}{% url 'courses:builder_edit_question' course.id assessment.id question.id %}{% else %}{% url 'courses:builder_add_question' course.id assessment.id %}{% endif %}"
          hx-target="{% if is_edit %}closest [data-question-id]{% else %}#question-list-{{ assessment.id }}{% endif %}"
          hx-swap="{% if is_edit %}outerHTML{% else %}beforeend{% endif %}"
          @htmx:after-request.camel="if(event.detail.successful) { {% if not is_edit %}showAddQuestion = false;{% endif %} }">
        {% csrf_token %}

        <h6 class="text-xs font-semibold mb-3">{% if is_edit %}Editar Pregunta{% else %}Nueva Pregunta{% endif %}</h6>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-3">
            <!-- Question Type -->
            <div class="form-control">
                <label class="label py-0"><span class="label-text text-xs">Tipo de pregunta</span></label>
                <select name="question_type" x-model="questionType" class="select select-bordered select-xs w-full">
                    <option value="single_choice">Seleccion unica</option>
                    <option value="multiple_choice">Seleccion multiple</option>
                    <option value="true_false">Verdadero/Falso</option>
                    <option value="matching">Emparejamiento</option>
                </select>
            </div>

            <!-- Points -->
            <div class="form-control">
                <label class="label py-0"><span class="label-text text-xs">Puntos</span></label>
                <input type="number" name="points" x-model="points" min="1" max="100"
                       class="input input-bordered input-xs w-full">
            </div>

            <div></div>
        </div>

        <!-- Question Text -->
        <div class="form-control mb-3">
            <label class="label py-0"><span class="label-text text-xs">Pregunta <span class="text-error">*</span></span></label>
            <textarea name="text" x-model="text" rows="2"
                      class="textarea textarea-bordered textarea-xs w-full"
                      placeholder="Escribe la pregunta..." required></textarea>
        </div>

        <!-- SINGLE CHOICE / MULTIPLE CHOICE answers -->
        <template x-if="questionType === 'single_choice' || questionType === 'multiple_choice'">
            <div class="mb-3">
                <label class="label py-0"><span class="label-text text-xs">Opciones de respuesta</span></label>
                <div class="space-y-2 mt-1">
                    <template x-for="(answer, index) in answers" :key="index">
                        <div class="flex items-center gap-2">
                            <template x-if="questionType === 'single_choice'">
                                <input type="radio" name="correct_answer" :value="index"
                                       :checked="answer.is_correct"
                                       class="radio radio-primary radio-xs"
                                       @change="setSingleCorrect(index)">
                            </template>
                            <template x-if="questionType === 'multiple_choice'">
                                <input type="checkbox" name="correct_answer" :value="index"
                                       :checked="answer.is_correct"
                                       class="checkbox checkbox-primary checkbox-xs"
                                       @change="answer.is_correct = $el.checked">
                            </template>

                            <input type="text" name="answer_text" x-model="answer.text"
                                   class="input input-bordered input-xs flex-1"
                                   :placeholder="'Opcion ' + (index + 1)" required>

                            <button type="button" class="btn btn-ghost btn-xs text-error"
                                    @click="removeAnswer(index)" x-show="answers.length > 2">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                                </svg>
                            </button>
                        </div>
                    </template>
                </div>
                <button type="button" class="btn btn-ghost btn-xs mt-2" @click="addAnswer()">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                    </svg>
                    Agregar opcion
                </button>
                <p class="text-xs text-gray-400 mt-1" x-show="questionType === 'single_choice'">Selecciona el radio de la respuesta correcta.</p>
                <p class="text-xs text-gray-400 mt-1" x-show="questionType === 'multiple_choice'">Marca las casillas de las respuestas correctas.</p>
            </div>
        </template>

        <!-- TRUE/FALSE -->
        <template x-if="questionType === 'true_false'">
            <div class="mb-3">
                <label class="label py-0"><span class="label-text text-xs">Respuesta correcta</span></label>
                <div class="flex gap-4 mt-1">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="radio" name="correct_answer" value="true" x-model="trueFalseCorrect"
                               class="radio radio-primary radio-xs">
                        <span class="text-sm">Verdadero</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="radio" name="correct_answer" value="false" x-model="trueFalseCorrect"
                               class="radio radio-primary radio-xs">
                        <span class="text-sm">Falso</span>
                    </label>
                </div>
            </div>
        </template>

        <!-- MATCHING -->
        <template x-if="questionType === 'matching'">
            <div class="mb-3">
                <label class="label py-0"><span class="label-text text-xs">Pares de emparejamiento</span></label>
                <div class="space-y-2 mt-1">
                    <div class="grid grid-cols-2 gap-2 text-xs font-semibold text-gray-500 px-1">
                        <span>Elemento</span>
                        <span>Coincidencia</span>
                    </div>
                    <template x-for="(pair, index) in matchPairs" :key="index">
                        <div class="flex items-center gap-2">
                            <input type="text" name="match_left" x-model="pair.left"
                                   class="input input-bordered input-xs flex-1"
                                   :placeholder="'Elemento ' + (index + 1)" required>
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gray-400 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                            </svg>
                            <input type="text" name="match_right" x-model="pair.right"
                                   class="input input-bordered input-xs flex-1"
                                   :placeholder="'Coincidencia ' + (index + 1)" required>
                            <button type="button" class="btn btn-ghost btn-xs text-error"
                                    @click="removeMatchPair(index)" x-show="matchPairs.length > 2">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                                </svg>
                            </button>
                        </div>
                    </template>
                </div>
                <button type="button" class="btn btn-ghost btn-xs mt-2" @click="addMatchPair()">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                    </svg>
                    Agregar par
                </button>
                <p class="text-xs text-gray-400 mt-1">Cada elemento de la izquierda se empareja con su coincidencia de la derecha.</p>
            </div>
        </template>

        <!-- Explanation -->
        <div class="form-control mb-3">
            <label class="label py-0"><span class="label-text text-xs">Explicacion (opcional)</span></label>
            <textarea name="explanation" x-model="explanation" rows="1"
                      class="textarea textarea-bordered textarea-xs w-full"
                      placeholder="Explicacion de la respuesta correcta..."></textarea>
        </div>

        <!-- Actions -->
        <div class="flex gap-2 justify-end">
            <button type="button" class="btn btn-ghost btn-xs"
                    @click="{% if is_edit %}editing = false{% else %}showAddQuestion = false{% endif %}">
                Cancelar
            </button>
            <button type="submit" class="btn btn-primary btn-xs">
                {% if is_edit %}Guardar{% else %}Agregar Pregunta{% endif %}
            </button>
        </div>
    </form>
</div>
